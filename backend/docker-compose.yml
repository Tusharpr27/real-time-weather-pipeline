version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: weather-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weather}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: weather-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-password} --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_network
    restart: unless-stopped

  # Weather Pipeline Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weather-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # App Settings
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-False}
      API_PORT: ${API_PORT:-8000}

      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-weather}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}

      # Weather API
      WEATHER_API_KEY: ${WEATHER_API_KEY:-demo}
      WEATHER_API_PROVIDER: ${WEATHER_API_PROVIDER:-open-meteo}
      WEATHER_FETCH_INTERVAL: ${WEATHER_FETCH_INTERVAL:-900}

      # Locations
      WEATHER_LOCATIONS: ${WEATHER_LOCATIONS:-Delhi,Mumbai,Bangalore,Chennai,Kolkata}

      # Alert Settings
      ALERT_TEMP_HIGH: ${ALERT_TEMP_HIGH:-35}
      ALERT_TEMP_LOW: ${ALERT_TEMP_LOW:--10}
      ALERT_HUMIDITY_HIGH: ${ALERT_HUMIDITY_HIGH:-90}
      ALERT_HUMIDITY_LOW: ${ALERT_HUMIDITY_LOW:-10}
      ALERT_WIND_SPEED: ${ALERT_WIND_SPEED:-40}
      ALERT_PRESSURE_HIGH: ${ALERT_PRESSURE_HIGH:-1020}
      ALERT_PRESSURE_LOW: ${ALERT_PRESSURE_LOW:-990}

      # Email Settings
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-app-password}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-alerts@weather.local}
      ALERT_FROM_NAME: ${ALERT_FROM_NAME:-Weather System}

      # Data Retention
      WEATHER_DATA_RETENTION_DAYS: ${WEATHER_DATA_RETENTION_DAYS:-30}
      HOURLY_DATA_RETENTION_DAYS: ${HOURLY_DATA_RETENTION_DAYS:-90}
      DAILY_DATA_RETENTION_DAYS: ${DAILY_DATA_RETENTION_DAYS:-180}
      WEEKLY_DATA_RETENTION_DAYS: ${WEEKLY_DATA_RETENTION_DAYS:-365}

      # Monitoring
      MONITORING_ENABLED: ${MONITORING_ENABLED:-True}
      HEALTH_CHECK_ENABLED: ${HEALTH_CHECK_ENABLED:-True}
      ERROR_TRACKING_ENABLED: ${ERROR_TRACKING_ENABLED:-True}
      AUDIT_LOGGING_ENABLED: ${AUDIT_LOGGING_ENABLED:-True}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}

      # Security
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      CORS_ENABLED: ${CORS_ENABLED:-True}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-True}

    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./archives:/app/archives
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - weather_network
    restart: unless-stopped
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        cpus: '1'
        memory: 1G

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  weather_network:
    driver: bridge
